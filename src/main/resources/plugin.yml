name: FindTrade
version: '0.4.0'
main: org.teamck.findtrade.core.FindTradePlugin
api-version: '1.21'
softdepend: [WorldEdit]
commands:
  findtrade:
    description: Search for villager enchantment trades and manage regions
    usage: |
      §6=== FindTrade Commands ===
      §e/findtrade search <enchantment> §7- Search for villagers
      §e/findtrade region [create|list|delete|edit] §7- Manage regions
    permission: findtrade.use
    aliases: [ft]

permissions:
  findtrade.use:
    description: Allows use of search and region list features
    default: true
  findtrade.write:
    description: Allows creating, editing, and deleting regions
    default: op
    children:
      findtrade.use: true
