version: '0.4.0'

# ===========================================
# Particle Effects Configuration
# ===========================================
particle-effects:
  # Persistent mode: particles stay until manually cancelled or player opens villager trade
  # When false, particles disappear after 'duration' seconds
  persistent: true
  
  # How long particles are displayed (seconds) - only used when persistent is false
  duration: 30

  # ===========================================
  # Pillar Particle Settings
  # ===========================================
  # Particles displayed as a pillar above the villager's location
  pillar:
    # Enable/disable pillar effect
    enabled: true
    
    # Spawn interval (seconds)
    interval: 1
    
    # Pillar particle configurations
    particles:
      - type: "HAPPY_VILLAGER"
        height: 20
        count: 10
      - type: "ENCHANT"
        height: 20
        count: 10
      - type: "END_ROD"
        height: 20
        count: 5

  # ===========================================
  # Path Particle Settings
  # ===========================================
  # Particles displayed along the path between player and villager
  path:
    # Enable/disable path effect
    enabled: true
    
    # ===========================================
    # Pathfinding Options (A* Algorithm)
    # ===========================================
    # Set to 'true' to use A* pathfinding for realistic walkable paths
    # Set to 'false' to use simple straight line (lower server load)
    #
    # NOTE: Pathfinding uses the Pathetic library which runs asynchronously.
    # It's generally low-impact, but if you experience performance issues
    # or prefer simpler visuals, set this to 'false'.
    use-pathfinding: true
    
    # Number of points in the straight line (only used when use-pathfinding is false)
    points: 20
    
    # How often to update the path particles (seconds)
    # Lower = smoother but more frequent particle spawns
    update-interval: 0.1
    
    # How often to recalculate the path (seconds) - for persistent mode
    # The path is recalculated from player's current position to target
    # Set higher to reduce server load, lower for more accurate paths
    refresh-interval: 1
    
    # Path particle configurations
    # You can specify multiple particle types with different settings
    particles:
      - type: "ENCHANT"
        count: 1
        # Position offset from path point (blocks)
        offset-x: 0.5
        offset-y: 0.5
        offset-z: 0.5
        # Random spread for particle spawn position
        randomness-x: 0.0
        randomness-y: 0.0
        randomness-z: 0.0
        # Particle speed (0.0 = stationary)
        speed: 0.0
      - type: "ELECTRIC_SPARK"
        count: 2
        offset-x: 0.5
        offset-y: 0.5
        offset-z: 0.5
        randomness-x: 0.1
        randomness-y: 0.1
        randomness-z: 0.1
        speed: 0.02
    
    # ===========================================
    # Moving Highlight Particle Settings
    # ===========================================
    # A special particle that moves along the path to indicate direction
    # It travels from player to villager repeatedly
    highlight:
      # Enable/disable moving highlight
      enabled: false
      
      # Movement speed (blocks per second)
      speed: 10.0
      
      # Interval between multiple highlights (blocks)
      # Multiple highlight particles will be spawned at this interval
      # Set to 0 for a single highlight only
      # Example: 15 means highlights spawn every 15 blocks along the path
      spawn-interval: 15.0
      
      # How often to update highlight position (seconds)
      # Lower = smoother movement but more particle spawns
      tick-interval: 0.05
      
      # Highlight particle configurations
      particles:
        - type: "HAPPY_VILLAGER"
          count: 3
          offset-x: 0.5
          offset-y: 0.5
          offset-z: 0.5
          randomness-x: 0.2
          randomness-y: 0.2
          randomness-z: 0.2
          speed: 0.0
        - type: "COMPOSTER"
          count: 5
          offset-x: 0.5
          offset-y: 0.5
          offset-z: 0.5
          randomness-x: 0.3
          randomness-y: 0.3
          randomness-z: 0.3
          speed: 1
